<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Painel — Corte Dú Amigo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/px.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- LOGIN -->
  <section id="login" class="login-wrap">
    <div class="login-card">
      <p class="eyebrow">Painel · Corte Dú Amigo</p>
      <p class="brand">Entrar</p>
      <div class="campo">
        <label for="login-email">E-mail</label>
        <input id="login-email" type="email" autocomplete="username" placeholder="voce@exemplo.com">
      </div>
      <div class="campo">
        <label for="login-senha">Senha</label>
        <input id="login-senha" type="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button id="btn-login" class="btn" type="button">Entrar</button>
      <p id="login-erro" class="login-erro"></p>
    </div>
  </section>

  <!-- PAINEL -->
  <section id="painel" style="display:none">
    <div class="topbar">
      <div class="marca">Corte Dú Amigo<small>Painel do Duin</small></div>
      <button id="btn-sair" class="btn-sair" type="button">Sair</button>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="dashboard" type="button">Dashboard</button>
      <button class="tab" data-tab="agenda" type="button">Agenda</button>
      <button class="tab" data-tab="servicos" type="button">Serviços</button>
      <button class="tab" data-tab="pausas" type="button">Pausas</button>
    </nav>

    <main class="wrap">
      <!-- DASHBOARD -->
      <section id="tab-dashboard" class="tab-panel show">
        <div class="metricas">
          <div class="metrica"><b id="m-hoje">0</b><span>agendados hoje</span></div>
          <div class="metrica"><b id="m-semana">0</b><span>nos próximos 7 dias</span></div>
          <div class="metrica wide"><b id="m-proximo">—</b><span>próximo cliente</span></div>
        </div>
        <h2 style="font-family:var(--font-display);font-weight:500;font-size:1.2rem;margin:1.4rem 0 .6rem">Próximos</h2>
        <div id="dash-proximos"></div>
        <h2 style="font-family:var(--font-display);font-weight:500;font-size:1.2rem;margin:1.6rem 0 .6rem">Últimas avaliações</h2>
        <div id="dash-avaliacoes"></div>
      </section>

      <!-- AGENDA -->
      <section id="tab-agenda" class="tab-panel">
        <div id="ag-lista" style="padding-top:1rem"></div>
      </section>

      <!-- SERVIÇOS -->
      <section id="tab-servicos" class="tab-panel">
        <div class="secao-topo" style="margin-top:1.2rem">
          <h2>Serviços</h2>
          <button id="btn-novo-servico" class="mini" type="button">+ Novo serviço</button>
        </div>

        <div id="serv-form" class="form-box">
          <h3 id="serv-form-titulo" style="margin:0 0 1rem;font-family:var(--font-display);font-weight:500">Novo serviço</h3>
          <div class="form-grid">
            <div class="campo full"><label for="sf-nome">Nome</label><input id="sf-nome" type="text" placeholder="Corte, Barba…"></div>
            <div class="campo"><label for="sf-duracao">Duração (min)</label><input id="sf-duracao" type="number" min="5" step="5" placeholder="40"></div>
            <div class="campo"><label for="sf-preco">Preço (R$)</label><input id="sf-preco" type="number" min="0" step="0.01" placeholder="40.00"></div>
            <div class="campo full"><label for="sf-imagem">Foto (opcional)</label><input id="sf-imagem" type="file" accept="image/*"></div>
            <label class="check full"><input id="sf-ativo" type="checkbox" checked> Ativo (aparece pro cliente)</label>
          </div>
          <div style="display:flex;gap:.6rem;margin-top:1rem">
            <button id="btn-salvar-servico" class="btn" type="button">Salvar serviço</button>
            <button id="btn-cancelar-servico" class="btn btn-ghost" type="button">Cancelar</button>
          </div>
        </div>

        <div id="serv-grid" class="serv-grid"></div>
      </section>

      <!-- PAUSAS -->
      <section id="tab-pausas" class="tab-panel">
        <div class="form-box show" style="margin-top:1.2rem">
          <h3 style="margin:0 0 1rem;font-family:var(--font-display);font-weight:500">Nova pausa</h3>
          <p class="item-sub" style="margin:-.5rem 0 1rem">Bloqueia a agenda (almoço, folga, feriado). Nenhum horário pode ser marcado dentro da pausa.</p>
          <div class="form-grid">
            <div class="campo"><label for="pausa-inicio">Início</label><input id="pausa-inicio" type="datetime-local"></div>
            <div class="campo"><label for="pausa-fim">Fim</label><input id="pausa-fim" type="datetime-local"></div>
            <div class="campo full"><label for="pausa-motivo">Motivo (opcional)</label><input id="pausa-motivo" type="text" placeholder="Almoço, folga, feriado…"></div>
          </div>
          <button id="btn-add-pausa" class="btn" type="button" style="margin-top:1rem">Bloquear</button>
        </div>
        <h2 style="font-family:var(--font-display);font-weight:500;font-size:1.2rem;margin:1.6rem 0 .6rem">Pausas agendadas</h2>
        <div id="pausas-lista"></div>
      </section>
    </main>
  </section>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
